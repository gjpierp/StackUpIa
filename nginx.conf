# =====================================================================
# @file nginx.conf
# @description Configuración del proxy inverso Nginx para desarrollo local de Stackupia.
# @author Gerardo Paiva G.
# @date 18-07-2026
# 
# HISTORIAL DE CAMBIOS:
# Version | Fecha      | Autor            | Descripción
# V1.0.0  | 18-07-2026 | Gerardo Paiva G. | Configuración básica de servidor web para servir el frontend estático.
# =====================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}

# =====================================================================
# @file docker-compose.yml
# @description Configuración de contenedores Docker incluyendo Prometheus para monitoreo de métricas.
# @author Gerardo Paiva G.
# @date 18-07-2026
# 
# HISTORIAL DE CAMBIOS:
# Version | Fecha      | Autor            | Descripción
# V1.2.0  | 18-07-2026 | Gerardo Paiva G. | Integración del servicio Prometheus para la telemetría SRE.
# =====================================================================

version: '3.8'

services:
  database:
    image: postgres:16.1-alpine
    container_name: stackupia-postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_secure_pwd_123
      POSTGRES_DB: stackupia_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - pg_backups:/var/lib/postgresql/backups
      - ./scripts/entrypoint-db.sh:/usr/local/bin/entrypoint-db.sh
    entrypoint: ["/usr/local/bin/entrypoint-db.sh"]
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stackupia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7.2.3-alpine
    container_name: stackupia-redis-cache
    command: redis-server --requirepass redis_secure_pwd_123 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_pwd_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:22.14-alpine
    container_name: stackupia-backend-api
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app
    command: sh -c "npm install && node src/infrastructure/entrypoints/server.js"
    environment:
      - PORT=3000
      - DB_HOST=database
      - DB_USER=admin
      - DB_PASSWORD=admin_secure_pwd_123
      - DB_NAME=stackupia_db
      - DB_PORT=5432
    ports:
      - "3000:3000"
    depends_on:
      - database

  web:
    image: nginx:1.25-alpine
    container_name: stackupia-web
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - database
      - cache
      - backend

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: stackupia-prometheus
    volumes:
      - ./sre/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./sre/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

volumes:
  pg_data:
    driver: local
  pg_backups:
    driver: local
  redis_data:
    driver: local

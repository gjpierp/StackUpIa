# =====================================================================
# @file docker-compose-infra.yml
# @description Infraestructura de observabilidad centralizada (Loki, Promtail y Grafana) para el portal Stackupia.
# @author Gerardo Paiva G.
# @date 18-07-2026
# 
# HISTORIAL DE CAMBIOS:
# Version | Fecha      | Autor            | Descripción
# V1.0.0  | 18-07-2026 | Gerardo Paiva G. | Configuración inicial del stack LGG (Loki-Grafana-Promtail).
# =====================================================================

version: '3.8'

services:
  loki:
    image: grafana/loki:2.9.2
    container_name: stackupia-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - stackupia-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M

  promtail:
    image: grafana/promtail:2.9.2
    container_name: stackupia-promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./devops/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - stackupia-net
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M

  grafana:
    image: grafana/grafana:10.2.2
    container_name: stackupia-grafana
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_production_secured
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - stackupia-net
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M

volumes:
  loki-data:
    driver: local
  grafana-data:
    driver: local

networks:
  stackupia-net:
    name: stackupia_default
    external: true
